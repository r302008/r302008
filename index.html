<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Task Manager</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f5f9;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.input-section{
display:grid;
grid-template-columns:1fr;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.add-btn{
background:#2563eb;
color:white;
}

.add-btn:hover{
background:#1d4ed8;
}

.task{
background:#f8fafc;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.task.done{
opacity:0.6;
text-decoration:line-through;
}

.task-left{
display:flex;
flex-direction:column;
gap:5px;
}

.category{
font-size:12px;
color:#666;
}

.priority{
font-size:12px;
font-weight:bold;
}

.high{
color:red;
}

.medium{
color:orange;
}

.low{
color:green;
}

.actions button{
margin-left:5px;
padding:8px 12px;
}

.done-btn{
background:#16a34a;
color:white;
}

.delete-btn{
background:#dc2626;
color:white;
}

.stats{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏪 Shop Task Manager</h1>

<div class="stats">
<span>Total: <span id="total">0</span></span>
<span>Completed: <span id="completed">0</span></span>
</div>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Enter task">

<select id="category">
<option>Inventory</option>
<option>Payments</option>
<option>Supplier</option>
<option>Daily Work</option>
</select>

<select id="priority">
<option value="High">High Priority</option>
<option value="Medium">Medium Priority</option>
<option value="Low">Low Priority</option>
</select>

<button class="add-btn" onclick="addTask()">Add Task</button>
</div>

<div id="taskList"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("shopTasks")) || [];

function saveTasks(){
localStorage.setItem("shopTasks",JSON.stringify(tasks));
}

function addTask(){

const text = document.getElementById("taskInput").value.trim();
const category = document.getElementById("category").value;
const priority = document.getElementById("priority").value;

if(text===""){
alert("Enter a task");
return;
}

tasks.push({
text,
category,
priority,
done:false
});

document.getElementById("taskInput").value="";

saveTasks();
renderTasks();
}

function toggleTask(index){
tasks[index].done=!tasks[index].done;
saveTasks();
renderTasks();
}

function deleteTask(index){
tasks.splice(index,1);
saveTasks();
renderTasks();
}

function renderTasks(){

const taskList=document.getElementById("taskList");
taskList.innerHTML="";

let completed=0;

tasks.forEach((task,index)=>{

if(task.done) completed++;

taskList.innerHTML += `
<div class="task ${task.done ? 'done' : ''}">
<div class="task-left">
<strong>${task.text}</strong>
<span class="category">${task.category}</span>
<span class="priority ${task.priority.toLowerCase()}">${task.priority}</span>
</div>

<div class="actions">
<button class="done-btn"
onclick="toggleTask(${index})">
✓
</button>

<button class="delete-btn"
onclick="deleteTask(${index})">
🗑
</button>
</div>
</div>
`;
});

document.getElementById("total").textContent=tasks.length;
document.getElementById("completed").textContent=completed;
}

renderTasks();

</script>

</body>
</html>
